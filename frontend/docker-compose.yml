services:
  vidtogallery:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    image: vidtogallery:latest
    container_name: vidtogallery-app
    restart: unless-stopped
    
    # Resource limits optimized for Raspberry Pi 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Security configurations
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    
    # Temporary filesystems for writable directories
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
      - /var/cache/nginx:noexec,nosuid,size=64m
      - /var/log/nginx:noexec,nosuid,size=32m
      - /var/run:noexec,nosuid,size=16m
    
    ports:
      - "80:8080"
    
    environment:
      - NODE_ENV=production
      - TZ=America/New_York  # Adjust to your timezone
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Labels for management
    labels:
      - "traefik.enable=false"
      - "com.example.description=VidToGallery Vue.js App"
      - "com.example.department=frontend"
      - "com.example.label-with-empty-value"

  # Optional: Watchtower for automatic updates
  watchtower:
    image: containrrr/watchtower:arm64v8-latest
    container_name: vidtogallery-watchtower
    restart: unless-stopped
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    
    environment:
      - WATCHTOWER_POLL_INTERVAL=3600  # Check every hour
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=false
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
    
    # Only update our specific container
    command: vidtogallery-app
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# Networks (optional but recommended for isolation)
networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

# Volumes for persistent data (if needed in the future)
volumes:
  app_logs:
    driver: local
